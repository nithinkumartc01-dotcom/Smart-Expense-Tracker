{% extends "dashboard/base.html" %}
{% block content %}
<div class="container py-5">
    <div class="row mb-4">
        <div class="col-12 d-flex justify-content-between align-items-center">
            <div>
                <h2 class="display-6">User Management</h2>
                <p class="text-muted fw-light">Manage registered users.</p>
            </div>
            <a href="{{ url_for('expenses.tracker') }}" class="btn btn-outline-secondary">Back to Tracker</a>
        </div>
    </div>
 
    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="border-0 text-muted small fw-bold ps-4 py-3">EMAIL</th>
                            <th class="border-0 text-muted small fw-bold text-end pe-4 py-3">ACTION</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for user in users %}
                        <tr>
                            <td class="ps-4 fw-medium">{{ user.email }}</td>
                            <td class="text-end pe-4">
                                {% if user.email != "SmartX@gmail.com" %}
                                <form action="{{ url_for('dashboard.delete_user_route', user_id=user._id) }}" method="POST" class="d-inline">
                                    <button type="submit" class="btn btn-sm btn-outline-danger" onclick="return confirm('Are you sure you want to delete this user? All their data will be lost.')">
                                        Delete User
                                    </button>
                                </form>
                                {% else %}
                                <span class="badge bg-primary">Admin</span>
                                {% endif %}
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="2" class="text-center py-4 text-muted">No users found.</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
