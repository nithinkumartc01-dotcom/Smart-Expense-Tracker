{% extends "dashboard/base.html" %}
{% block content %}
<style>
    body {
        background-image: url("{{ url_for('static', filename='img/login.jpg') }}");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        background-attachment: fixed;
    }
    .auth-card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.7);
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
    }
    .form-control:focus {
        border-color: var(--color-blue);
        box-shadow: 0 0 0 0.25rem rgba(37, 99, 235, 0.2);
    }
</style>
<div class="container">
    <div class="row justify-content-center align-items-center register-wrapper" style="min-height: 85vh;">
        <div class="col-md-5 col-lg-4">
            <div class="card auth-card p-4 border-0">
                <div class="card-body p-2">
                    <div class="text-center mb-4">
                        <h3 class="mb-2">Create Account</h3>
                        <p class="text-muted fw-light small">Start tracking your finances today</p>
                    </div>
                    <form action="/register" method="POST">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">FULL NAME</label>
                            <input type="text" name="name" class="form-control" placeholder="John Doe" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">EMAIL ADDRESS</label>
                            <input type="email" name="email" class="form-control" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">PASSWORD</label>
                            <input type="password" name="password" class="form-control" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="btn btn-blue w-100 py-3 my-4">Create Account</button>
                        <div class="text-center">
                            <small class="text-muted fw-light">
                                Already have an account? <a href="/login" class="text-decoration-none text-blue">Log in</a>
                            </small>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
